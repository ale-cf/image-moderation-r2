<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image Moderation &amp; Transform</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #141b32;
        --panel-2: #1b2340;
        --border: #263056;
        --text: #e7ecff;
        --muted: #9aa6d0;
        --accent: #6c8cff;
        --accent-2: #46e0b0;
        --danger: #ff5c7a;
        --radius: 16px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(1200px 800px at 20% -10%, #1a2350 0%, var(--bg) 55%);
        color: var(--text);
        min-height: 100vh;
      }
      .wrap { max-width: 960px; margin: 0 auto; padding: 48px 20px 80px; }
      header h1 { font-size: 28px; margin: 0 0 6px; letter-spacing: -0.02em; }
      header p { color: var(--muted); margin: 0 0 28px; }

      .dropzone {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border: 2px dashed var(--border);
        border-radius: var(--radius);
        background: var(--panel);
        padding: 48px 24px;
        text-align: center;
        cursor: pointer;
        transition: border-color .18s, background .18s, transform .18s;
      }
      .dropzone:hover { border-color: var(--accent); }
      .dropzone.drag {
        border-color: var(--accent-2);
        background: var(--panel-2);
        transform: scale(1.01);
      }
      .dropzone .icon { font-size: 40px; }
      .dropzone .hint { color: var(--muted); font-size: 14px; margin-top: 8px; }
      .dropzone strong { color: var(--accent); }
      input[type="file"] { display: none; }

      .status {
        margin-top: 20px;
        padding: 14px 16px;
        border-radius: 12px;
        font-size: 14px;
        display: none;
      }
      .status.show { display: block; }
      .status.info { background: #14224a; border: 1px solid #24408a; }
      .status.safe { background: #0f2e26; border: 1px solid #1f6b54; }
      .status.unsafe { background: #35121d; border: 1px solid #7a2338; color: #ffd7de; }
      .status.error { background: #35121d; border: 1px solid #7a2338; color: #ffd7de; }

      .spinner {
        width: 16px; height: 16px; border-radius: 50%;
        border: 2px solid rgba(255,255,255,.25); border-top-color: #fff;
        display: inline-block; vertical-align: -3px; margin-right: 8px;
        animation: spin .8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
        margin-top: 28px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }
      .card .thumb {
        aspect-ratio: 1 / 1;
        background: #0a0f22 center/cover no-repeat;
        display: flex; align-items: center; justify-content: center;
      }
      .card .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .card .meta { padding: 12px 14px; }
      .card .meta .name { font-weight: 600; text-transform: capitalize; }
      .card .meta a { color: var(--accent); font-size: 12px; word-break: break-all; text-decoration: none; }
      .card .meta a:hover { text-decoration: underline; }

      .preview { margin-top: 24px; display: none; }
      .preview.show { display: block; }
      .preview img { max-height: 220px; border-radius: 12px; border: 1px solid var(--border); }

      footer { color: var(--muted); font-size: 12px; margin-top: 40px; text-align: center; }
      code { background: #0a0f22; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Image Moderation &amp; Transform</h1>
        <p>Drop an image to scan it for unsafe content, then generate 4 optimized variants served from R2.</p>
      </header>

      <label id="dropzone" class="dropzone" for="file-input">
        <div class="icon">⬆️</div>
        <div>Drag &amp; drop an image here, or <strong>click to browse</strong></div>
        <div class="hint">JPEG, PNG, GIF, WebP or AVIF · up to 20&nbsp;MB</div>
      </label>
      <input id="file-input" type="file" accept="image/*" />

      <div id="preview" class="preview">
        <img id="preview-img" alt="Selected image preview" />
      </div>

      <div id="status" class="status"></div>

      <div id="grid" class="grid"></div>

      <footer>
        Powered by Workers AI, Cloudflare Images &amp; R2.
      </footer>
    </div>

    <script>
      const dropzone = document.getElementById("dropzone");
      const fileInput = document.getElementById("file-input");
      const statusEl = document.getElementById("status");
      const grid = document.getElementById("grid");
      const preview = document.getElementById("preview");
      const previewImg = document.getElementById("preview-img");

      function setStatus(kind, html) {
        statusEl.className = "status show " + kind;
        statusEl.innerHTML = html;
      }
      function clearStatus() {
        statusEl.className = "status";
        statusEl.innerHTML = "";
      }

      ["dragenter", "dragover"].forEach((ev) =>
        dropzone.addEventListener(ev, (e) => {
          e.preventDefault();
          dropzone.classList.add("drag");
        }),
      );
      ["dragleave", "drop"].forEach((ev) =>
        dropzone.addEventListener(ev, (e) => {
          e.preventDefault();
          dropzone.classList.remove("drag");
        }),
      );
      dropzone.addEventListener("drop", (e) => {
        const file = e.dataTransfer?.files?.[0];
        if (file) handleFile(file);
      });
      fileInput.addEventListener("change", () => {
        if (fileInput.files?.[0]) handleFile(fileInput.files[0]);
      });

      async function handleFile(file) {
        if (!file.type.startsWith("image/")) {
          setStatus("error", "Please choose an image file.");
          return;
        }
        grid.innerHTML = "";
        previewImg.src = URL.createObjectURL(file);
        preview.classList.add("show");
        setStatus("info", '<span class="spinner"></span>Analyzing &amp; processing…');

        const body = new FormData();
        body.append("image", file);

        let res, data;
        try {
          res = await fetch("/api/process", { method: "POST", body });
          data = await res.json();
        } catch (err) {
          setStatus("error", "Network error. Please try again.");
          return;
        }

        if (res.ok && data.safe) {
          const reason = escapeHtml(data.moderation?.reason || "");
          setStatus("safe", "✅ <strong>Safe.</strong> " + reason + " — generated " + data.variants.length + " variants.");
          renderVariants(data.variants);
        } else if (res.status === 422 && data.moderation) {
          const reason = escapeHtml(data.moderation.reason || "");
          setStatus("unsafe", "🚫 <strong>Rejected (" + escapeHtml(data.moderation.rating) + ").</strong> " + reason);
        } else {
          setStatus("error", "⚠️ " + escapeHtml(data.error || "Something went wrong."));
        }
      }

      function renderVariants(variants) {
        grid.innerHTML = variants
          .map(
            (v) => `
          <div class="card">
            <div class="thumb"><img src="${v.url}" alt="${v.name}" loading="lazy" onerror="this.parentElement.textContent='preview unavailable'" /></div>
            <div class="meta">
              <div class="name">${escapeHtml(v.name)}</div>
              <a href="${v.url}" target="_blank" rel="noopener">${escapeHtml(v.url)}</a>
            </div>
          </div>`,
          )
          .join("");
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      }
    </script>
  </body>
</html>
